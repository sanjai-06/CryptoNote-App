name: Build & Release CryptoNote

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Desktop Builds (Linux, Windows, macOS) ───────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macos-amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CryptoNote ${{ github.ref_name }}'
          releaseBody: 'Download CryptoNote for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # ─── Android Build ────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Only arm64-v8a — covers 95%+ of modern Android phones.
          # Adding armv7/x86/x86_64 triples the APK size for almost no benefit.
          targets: aarch64-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (production)
        run: npm run build

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Set up keystore for release signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/release.keystore
            echo "KEYSTORE_PATH=$HOME/release.keystore" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "SIGNING=release" >> $GITHUB_ENV
          else
            echo "No keystore secrets found, building unsigned release APK"
            echo "SIGNING=unsigned" >> $GITHUB_ENV
          fi

      - name: Build Android release APK (arm64 only, stripped)
        run: |
          # tauri android build is release mode by default (no --debug flag needed)
          # Do NOT pass -- --release, Tauri already adds it internally
          npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          # Strip debug symbols from the shared library to cut size
          CARGO_PROFILE_RELEASE_STRIP: "symbols"
          # Optimize for size, not speed
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "s"

      - name: Find, rename and measure APK
        run: |
          mkdir -p dist
          # Copy release APK
          find src-tauri/gen/android -name "*release*.apk" -o -name "*Release*.apk" | \
            xargs -I{} cp {} dist/cryptonote-arm64-release.apk 2>/dev/null || true
          # Fallback: any APK
          if [ -z "$(ls dist/*.apk 2>/dev/null)" ]; then
            find src-tauri/gen/android -name "*.apk" | head -1 | \
              xargs -I{} cp {} dist/cryptonote-arm64-release.apk 2>/dev/null || true
          fi
          echo "=== APK sizes ==="
          ls -lh dist/*.apk 2>/dev/null || echo "No APKs found"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cryptonote-android-arm64-release
          path: dist/*.apk
          if-no-files-found: warn

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── iOS Build ────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Build iOS (Unsigned)
        run: npx tauri ios build -- -allowProvisioningUpdates
        continue-on-error: true

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cryptonote-ios-build
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn
