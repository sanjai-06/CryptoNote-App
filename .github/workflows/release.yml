name: Build & Release CryptoNote

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Desktop Builds (Linux, Windows, macOS) ───────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macos-amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CryptoNote ${{ github.ref_name }}'
          releaseBody: 'Download CryptoNote for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # ─── Android Build ────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Only arm64-v8a — covers 95%+ of modern Android phones.
          # Adding armv7/x86/x86_64 triples the APK size for almost no benefit.
          targets: aarch64-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            imagemagick

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (production)
        run: npm run build

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Inject new skull logo into Android mipmap folders
        run: |
          LOGO="src-tauri/icons/icon.png"
          ANDROID_RES="src-tauri/gen/android/app/src/main/res"
          declare -A SIZES=( ["mipmap-mdpi"]=48 ["mipmap-hdpi"]=72 ["mipmap-xhdpi"]=96 ["mipmap-xxhdpi"]=144 ["mipmap-xxxhdpi"]=192 )
          for dir in "${!SIZES[@]}"; do
            size="${SIZES[$dir]}"
            target="$ANDROID_RES/$dir"
            mkdir -p "$target"
            convert "$LOGO" -resize ${size}x${size} "$target/ic_launcher.png"
            convert "$LOGO" -resize ${size}x${size} "$target/ic_launcher_foreground.png"
            convert "$LOGO" -resize ${size}x${size} "$target/ic_launcher_round.png"
            echo "✓ $dir (${size}x${size})"
          done

      - name: Build Android APK (release mode, LTO disabled for stability)
        run: |
          npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          # ── LTO DISABLED ──────────────────────────────────────────────────
          # Fat/thin LTO + NDK 27 cross-compiler causes silent miscompilation
          # crashes on ARM64. This is the #1 cause of "app crashes on open".
          CARGO_PROFILE_RELEASE_LTO: "false"
          # ── Safe optimization level ────────────────────────────────────────
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "s"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          # ── Allow panic unwind so crashes appear in logcat ─────────────────
          CARGO_PROFILE_RELEASE_PANIC: "unwind"
          # ── Strip debug info (NOT symbols — keeps ABI intact on Android) ───
          CARGO_PROFILE_RELEASE_STRIP: "debuginfo"

      - name: Sign APK with debug keystore (makes it installable)
        run: |
          # Android debug keystore is always present on the runner
          # APKs signed with it can be installed on any device (sideloading)
          DEBUG_KS="$HOME/.android/debug.keystore"

          # Generate debug keystore if it doesn't exist yet
          if [ ! -f "$DEBUG_KS" ]; then
            mkdir -p "$HOME/.android"
            keytool -genkeypair -v \
              -keystore "$DEBUG_KS" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storepass android -keypass android
          fi

          # Find the release APK
          mkdir -p dist
          echo "=== All APKs generated ==="
          find src-tauri/gen/android -name "*.apk" -type f | sort

          # Prefer arm64 release APK
          APK=$(find src-tauri/gen/android -name "*arm64*release*.apk" -not -name "*unsigned*" -type f | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*release*.apk" -not -name "*universal*" -type f | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*release*.apk" -type f | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERROR: No release APK found!"; exit 1
          fi
          echo "✓ Found: $APK ($(du -sh "$APK" | cut -f1))"

          # Sign with apksigner
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner"
          "$APKSIGNER" sign \
            --ks "$DEBUG_KS" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out dist/cryptonote-arm64.apk \
            "$APK"

          echo "=== Final signed APK ==="
          ls -lh dist/cryptonote-arm64.apk
          "$APKSIGNER" verify dist/cryptonote-arm64.apk && echo "✓ APK signature valid"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptonote-android-arm64
          path: dist/cryptonote-arm64.apk
          if-no-files-found: error
          overwrite: true

      - name: Delete old APK assets from release (keep release clean)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: mknejp/delete-release-assets@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          assets: "*.apk"
          fail-if-no-assets: false
        continue-on-error: true

      - name: Attach signed APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: dist/cryptonote-arm64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── iOS Build ────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Build iOS (Unsigned)
        run: npx tauri ios build -- -allowProvisioningUpdates
        continue-on-error: true

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cryptonote-ios-build
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn
