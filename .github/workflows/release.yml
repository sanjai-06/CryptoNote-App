name: Build & Release CryptoNote

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Desktop Builds (Linux, Windows, macOS) ───────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macos-amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CryptoNote ${{ github.ref_name }}'
          releaseBody: 'Download CryptoNote for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # ─── Android Build ────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'ndk;27.0.12077973'

      - name: Set NDK_HOME env
        run: |
          if [ -d "$ANDROID_HOME/ndk/27.0.12077973" ]; then
            echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          elif [ -n "$ANDROID_NDK_LATEST_HOME" ] && [ -d "$ANDROID_NDK_LATEST_HOME" ]; then
            echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          else
            NDK=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -1)
            echo "NDK_HOME=$NDK" >> $GITHUB_ENV
          fi

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            imagemagick

      # ── Decode the persistent release keystore from GitHub Secrets ──
      # This ensures EVERY build is signed with the same key, so Android
      # allows over-the-air updates without uninstalling first.
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/cryptonote-release.jks
          echo "KEYSTORE_PATH=$HOME/cryptonote-release.jks" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (production)
        run: npm run build

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Inject app icon into Android mipmap folders
        run: |
          LOGO="src-tauri/icons/icon.png"
          ANDROID_RES="src-tauri/gen/android/app/src/main/res"
          declare -A SIZES=( ["mipmap-mdpi"]=48 ["mipmap-hdpi"]=72 ["mipmap-xhdpi"]=96 ["mipmap-xxhdpi"]=144 ["mipmap-xxxhdpi"]=192 )
          for dir in "${!SIZES[@]}"; do
            size="${SIZES[$dir]}"
            target="$ANDROID_RES/$dir"
            mkdir -p "$target"
            convert "$LOGO" -resize ${size}x${size} "$target/ic_launcher.png"
            convert "$LOGO" -resize ${size}x${size} "$target/ic_launcher_foreground.png"
            convert "$LOGO" -resize ${size}x${size} "$target/ic_launcher_round.png"
            echo "✓ $dir (${size}x${size})"
          done

      # ── Build release APK (unsigned) then sign it with our keystore ──
      # Release mode = optimized, smaller, and properly signable.
      - name: Build Android release APK
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find unsigned release APK
        run: |
          echo "=== All APKs ==="
          find src-tauri/gen/android -name "*.apk" -type f | sort

          # Prefer release arm64 APK (unsigned)
          APK=$(find src-tauri/gen/android \
            \( -name "*arm64*release*.apk" -o -name "*release*arm64*.apk" \) \
            -not -name "*signed*" \
            -type f | head -1)

          # Fallback: any release APK
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android \
              -name "*release*.apk" -not -name "*signed*" \
              -type f | head -1)
          fi

          # Last resort: any APK
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          fi

          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"; exit 1
          fi

          echo "UNSIGNED_APK=$APK" >> $GITHUB_ENV
          echo "Found APK: $APK"

      - name: Zipalign APK
        run: |
          ZIPALIGN="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/zipalign"
          mkdir -p dist
          "$ZIPALIGN" -v 4 "$UNSIGNED_APK" dist/cryptonote-arm64-aligned.apk
          echo "✓ zipalign done"

      - name: Sign APK with release keystore
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out dist/cryptonote-arm64.apk \
            dist/cryptonote-arm64-aligned.apk
          echo "✓ APK signed"
          "$APKSIGNER" verify --verbose dist/cryptonote-arm64.apk | head -5

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptonote-android-arm64
          path: dist/cryptonote-arm64.apk
          if-no-files-found: error
          overwrite: true

      - name: Delete old APK assets from release (keep release clean)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: mknejp/delete-release-assets@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          assets: "*.apk"
          fail-if-no-assets: false
        continue-on-error: true

      - name: Attach signed APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: dist/cryptonote-arm64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── iOS Build ────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Build iOS (Unsigned)
        run: npx tauri ios build -- -allowProvisioningUpdates
        continue-on-error: true

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cryptonote-ios-build
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn
