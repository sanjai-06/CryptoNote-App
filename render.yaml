services:
  - type: web
    name: cryptonote-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server-minimal.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
    healthCheckPath: /health
