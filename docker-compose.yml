services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/cryptonote
      - JWT_SECRET=dev-secret-change-in-production
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: src-ui/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data: